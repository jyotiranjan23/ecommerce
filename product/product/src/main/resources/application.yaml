spring:
  application:
    name: PRODUCT-SERVICE

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ecommerce}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: ${PORT:8081}
