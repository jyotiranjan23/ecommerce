server:
  port: ${PORT:8083}
spring:
  application:
    name: API-GATEWAY
  cloud:
    gateway:
      routes:
        - id: USER-SERVICE
          uri: lb://USER-SERVICE
          predicates:
            - Path=/ecommerce/user/**

        - id: PRODUCT-SERVICE
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/ecommerce/product/**

        - id: CART-SERVICE
          uri: lb://CART-SERVICE
          predicates:
            - Path=/ecommerce/cart/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
